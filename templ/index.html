<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Editor.js Experiments</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

	<link rel="stylesheet" href="/static/css/main.css" />
	<script src="/static/js/editorjs.umd.js"></script>
</head>

<body>
	<header>
		<h1>Block Tools</h1>
	</header>
	<main>
		<div id="editorjs"></div>
	</main>
	<script>
		const editor = new EditorJS({
			holder: 'editorjs',
			logLevel: 'VERBOSE',
			autofocus: true,
			placeholder: 'Welcome to your favorite web editor',
			data: {},

		});

		editor.isReady
			.then(() => console.log("Editorjs is ready for work"))
			.catch((reason) => console.log(`Editorjs failed to initialize with reason: ${reason}`))
	</script>
</body>

</html>
